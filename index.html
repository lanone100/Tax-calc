<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>營業稅計算機</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 20px; }
body { font-family: 'Noto Serif TC', serif; overscroll-behavior: none; min-height: 100dvh; }
button { border: none; cursor: pointer; font-family: inherit; outline: none; }
input { font-family: inherit; outline: none; }

/* ─── GOLD PALETTE ─── */
:root {
–g0: #fffbe8;
–g1: #f5e7a0;
–g2: #e8c97a;
–g3: #c9a84c;
–g4: #a07830;
–g5: #7a5c1e;
–g6: #4a3510;
–gold-grd: linear-gradient(135deg, #f5e7a0 0%, #c9a84c 40%, #e8c97a 60%, #a07830 100%);
–gold-grd-btn: linear-gradient(160deg, #e8c97a 0%, #c9a84c 50%, #b8922a 100%);
–gold-grd-soft: linear-gradient(135deg, rgba(232,201,122,0.18), rgba(201,168,76,0.06));
–green: #4a9a5c;
–green-soft: rgba(74,154,92,0.15);
–red: #c94c4c;
–red-soft: rgba(201,76,76,0.12);
–orange: #c97a30;
–radius-sm: 10px;
–radius-md: 14px;
–radius-lg: 18px;
–radius-xl: 24px;
}

/* ─── DARK (Black Gold) ─── */
body.dark {
–bg: #080806;
–bg2: #0e0d09;
–surface: #13120d;
–surface2: #1a1912;
–surface3: #222016;
–surface4: #2c2a1e;
–border: rgba(201,168,76,0.12);
–border-strong: rgba(201,168,76,0.25);
–text-p: #f0ead6;
–text-s: #a09060;
–text-t: #60522e;
–btn-num-bg: #1a1912;
–btn-num-bg2: #22201a;
–btn-fn-bg: #0e0d09;
–display-bg: #0e0d09;
–shadow-key: 0 4px 0 #000, 0 2px 10px rgba(0,0,0,0.7);
–shadow-card: 0 8px 32px rgba(0,0,0,0.8), 0 0 0 1px rgba(201,168,76,0.08);
–glow: 0 0 20px rgba(201,168,76,0.08);
}

/* ─── LIGHT (Parchment Gold) ─── */
body.light {
–bg: #f5f0e4;
–bg2: #ede6d0;
–surface: #faf6ea;
–surface2: #f2ead6;
–surface3: #e8dfc0;
–surface4: #ddd0a8;
–border: rgba(160,120,48,0.18);
–border-strong: rgba(160,120,48,0.35);
–text-p: #1e1808;
–text-s: #6b5020;
–text-t: #a08040;
–btn-num-bg: #faf6ea;
–btn-num-bg2: #f2ead6;
–btn-fn-bg: #e0d4b0;
–display-bg: #faf6ea;
–shadow-key: 0 4px 0 rgba(100,70,20,0.2), 0 2px 8px rgba(0,0,0,0.12);
–shadow-card: 0 4px 20px rgba(100,70,20,0.15), 0 0 0 1px rgba(160,120,48,0.15);
–glow: 0 0 30px rgba(201,168,76,0.12);
}

body {
background: var(–bg);
color: var(–text-p);
transition: background 0.35s, color 0.35s;
background-image:
radial-gradient(ellipse 90% 50% at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 55%);
}

/* ─── APP SHELL ─── */
.app {
max-width: 430px;
margin: 0 auto;
min-height: 100dvh;
display: flex;
flex-direction: column;
padding-bottom: max(env(safe-area-inset-bottom, 12px), 12px);
position: relative;
}

/* decorative corner lines */
.app::before {
content: ‘’;
position: fixed;
top: 0; left: 50%; transform: translateX(-50%);
width: min(430px, 100vw);
height: 3px;
background: var(–gold-grd);
z-index: 10;
}

/* ─── TOP BAR ─── */
.topbar {
display: flex;
align-items: center;
justify-content: space-between;
padding: 16px 18px 4px;
flex-shrink: 0;
position: relative;
}

.brand {
display: flex;
flex-direction: column;
gap: 1px;
}
.brand-en {
font-family: ‘Cormorant Garamond’, serif;
font-style: italic;
font-size: 15px;
color: var(–text-t);
letter-spacing: 2px;
line-height: 1;
}
.brand-zh {
font-size: 26px;
font-weight: 700;
background: var(–gold-grd);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
letter-spacing: 2px;
line-height: 1.2;
}

.topbar-actions { display: flex; gap: 8px; }

.icon-btn {
width: 46px; height: 46px;
border-radius: 50%;
background: var(–surface2);
border: 1px solid var(–border);
display: flex; align-items: center; justify-content: center;
color: var(–text-s);
position: relative;
transition: all 0.15s;
box-shadow: var(–shadow-card);
}
.icon-btn:active { transform: scale(0.88); }
.icon-btn svg { width: 22px; height: 22px; }
.icon-btn:hover { border-color: var(–border-strong); color: var(–g2); }

.hist-badge {
position: absolute;
top: -3px; right: -3px;
min-width: 20px; height: 20px;
border-radius: 10px;
background: var(–gold-grd-btn);
color: #0a0900;
font-size: 11px;
font-weight: 700;
display: flex; align-items: center; justify-content: center;
padding: 0 5px;
font-family: ‘DM Mono’, monospace;
box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}

/* ─── GOLD RULE ─── */
.gold-rule {
height: 1px;
margin: 6px 18px;
background: linear-gradient(90deg, transparent, var(–g3) 30%, var(–g2) 50%, var(–g3) 70%, transparent);
opacity: 0.5;
flex-shrink: 0;
position: relative;
}
.gold-rule::before {
content: ‘◆’;
position: absolute;
left: 50%; top: 50%;
transform: translate(-50%, -50%);
font-size: 10px;
color: var(–g3);
background: var(–bg);
padding: 0 4px;
line-height: 1;
}

/* ─── DISPLAY ─── */
.display-wrap {
padding: 6px 14px 0;
flex-shrink: 0;
}
.display {
background: var(–display-bg);
border: 1px solid var(–border);
border-radius: var(–radius-xl);
padding: 16px 20px 14px;
box-shadow: var(–shadow-card), var(–glow);
position: relative;
overflow: hidden;
}
/* inner glow top */
.display::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, var(–g3) 30%, var(–g2) 70%, transparent);
opacity: 0.6;
}

.expr-row {
font-family: ‘DM Mono’, monospace;
font-size: 18px;
color: var(–text-t);
text-align: right;
min-height: 26px;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
letter-spacing: 0.5px;
}

.main-num-wrap {
display: flex;
align-items: baseline;
justify-content: flex-end;
gap: 6px;
min-height: 72px;
}
.main-num {
font-family: ‘DM Mono’, monospace;
font-size: clamp(48px, 14vw, 68px);
font-weight: 500;
text-align: right;
background: var(–gold-grd);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
line-height: 1.05;
letter-spacing: -1px;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
transition: font-size 0.12s;
flex: 1;
}
.main-num.error {
-webkit-text-fill-color: var(–red);
color: var(–red);
font-size: 28px;
background: none;
}
.main-num.long { font-size: clamp(32px, 9vw, 42px); }

.chinese-row {
font-size: 16px;
color: var(–text-t);
text-align: right;
min-height: 22px;
letter-spacing: 1.5px;
font-weight: 400;
transition: color 0.2s;
}
.chinese-row.lit { color: var(–g3); }

/* ─── TAX CONFIG ─── */
.tax-cfg {
display: flex;
align-items: center;
gap: 8px;
margin-top: 14px;
flex-wrap: wrap;
}
.tax-cfg-lbl {
font-size: 15px;
color: var(–text-t);
letter-spacing: 2px;
font-weight: 500;
flex-shrink: 0;
}
.chips { display: flex; gap: 7px; flex-wrap: wrap; }
.chip {
padding: 7px 15px;
border-radius: 20px;
font-size: 15px;
font-weight: 600;
background: var(–surface3);
color: var(–text-s);
border: 1px solid var(–border);
transition: all 0.15s;
letter-spacing: 0.5px;
font-family: ‘DM Mono’, monospace;
}
.chip:active { transform: scale(0.91); }
.chip.on {
background: var(–gold-grd-btn);
color: #0a0900;
border-color: transparent;
box-shadow: 0 2px 8px rgba(180,130,30,0.4);
font-weight: 700;
}

/* ─── TAX RESULT ─── */
.tax-result {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 7px;
margin-top: 12px;
display: none;
}
.tax-result.show { display: grid; }
.tc {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: var(–radius-sm);
padding: 10px 8px 9px;
text-align: center;
}
.tc.hi {
background: var(–gold-grd-soft);
border-color: var(–border-strong);
}
.tc-lbl {
font-size: 13px;
color: var(–text-t);
letter-spacing: 1.5px;
margin-bottom: 5px;
font-weight: 500;
}
.tc-val {
font-family: ‘DM Mono’, monospace;
font-size: 18px;
font-weight: 600;
color: var(–text-s);
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}
.tc.hi .tc-val {
background: var(–gold-grd);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

/* ─── KEYPAD ─── */
.kp-wrap {
flex: 1;
padding: 8px 12px 6px;
display: flex;
flex-direction: column;
justify-content: flex-end;
}
.kp {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 9px;
}

.btn {
height: clamp(64px, 16vw, 78px);
border-radius: var(–radius-md);
font-weight: 600;
font-size: clamp(20px, 6vw, 26px);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 2px;
position: relative;
overflow: hidden;
transition: transform 0.08s, box-shadow 0.08s;
user-select: none;
-webkit-user-select: none;
}
.btn:active { transform: scale(0.90) translateY(2px); }

/* Number */
.btn-num {
background: var(–btn-num-bg);
color: var(–text-p);
border: 1px solid var(–border);
box-shadow: var(–shadow-key);
}
.btn-num:active { box-shadow: 0 1px 0 rgba(0,0,0,0.5); }
.btn-sub {
font-size: 12px;
font-weight: 500;
color: var(–g4);
line-height: 1;
font-family: ‘Noto Serif TC’, serif;
letter-spacing: 0.3px;
}

/* Function */
.btn-fn {
background: var(–btn-fn-bg);
color: var(–text-s);
border: 1px solid var(–border);
font-size: clamp(16px, 4.5vw, 19px);
letter-spacing: 0.5px;
box-shadow: var(–shadow-key);
}
.btn-fn:active { box-shadow: 0 1px 0 rgba(0,0,0,0.5); }

/* Operator — gold outline */
.btn-op {
background: transparent;
color: var(–g2);
border: 1.5px solid var(–border-strong);
font-size: clamp(24px, 7vw, 32px);
box-shadow: var(–shadow-key), inset 0 0 0 1px rgba(201,168,76,0.05);
background: var(–surface2);
transition: background 0.15s, border-color 0.15s, transform 0.08s, box-shadow 0.08s;
}
.btn-op:hover { background: var(–gold-grd-soft); border-color: var(–g3); }
.btn-op:active { box-shadow: 0 1px 0 rgba(0,0,0,0.5); }

/* Equals — full gold */
.btn-eq {
background: var(–gold-grd-btn);
color: #0a0800;
font-size: clamp(28px, 7.5vw, 34px);
border: none;
box-shadow: 0 4px 0 var(–g5), 0 6px 20px rgba(201,168,76,0.3);
}
.btn-eq:active { box-shadow: 0 1px 0 var(–g5); }

/* Wide */
.btn-wide { grid-column: span 2; }

/* Tax — gold gradient outline */
.btn-tax {
background: transparent;
color: var(–g2);
border: 1.5px solid var(–g3);
font-size: clamp(15px, 4.2vw, 18px);
letter-spacing: 1px;
grid-column: span 2;
background: var(–gold-grd-soft);
box-shadow: 0 3px 0 var(–g6), 0 4px 16px rgba(201,168,76,0.15);
font-weight: 700;
}
.btn-tax:active { box-shadow: 0 1px 0 var(–g6); }

/* Backspace */
.btn-bs {
background: var(–red-soft);
color: var(–red);
border: 1px solid rgba(201,76,76,0.2);
font-size: 26px;
box-shadow: var(–shadow-key);
}

/* Copy */
.btn-copy {
background: var(–surface3);
color: var(–text-s);
border: 1px solid var(–border);
font-size: 16px;
letter-spacing: 0.5px;
box-shadow: var(–shadow-key);
}

/* ─── DRAWER ─── */
.overlay {
position: fixed; inset: 0;
background: rgba(0,0,0,0.6);
backdrop-filter: blur(6px);
-webkit-backdrop-filter: blur(6px);
z-index: 50;
opacity: 0;
pointer-events: none;
transition: opacity 0.28s;
}
.overlay.show { opacity: 1; pointer-events: all; }

.drawer {
position: fixed;
bottom: 0; left: 0; right: 0;
max-width: 430px;
margin: 0 auto;
background: var(–surface);
border-radius: var(–radius-xl) var(–radius-xl) 0 0;
z-index: 51;
transform: translateY(100%);
transition: transform 0.34s cubic-bezier(0.32,0.72,0,1);
max-height: 78dvh;
display: flex;
flex-direction: column;
box-shadow: 0 -8px 40px rgba(0,0,0,0.7), 0 0 0 1px var(–border);
padding-bottom: max(env(safe-area-inset-bottom, 10px), 10px);
overflow: hidden;
}
.drawer::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
background: var(–gold-grd);
opacity: 0.7;
}
.drawer.show { transform: translateY(0); }

.drawer-handle {
width: 44px; height: 5px;
background: var(–border-strong);
border-radius: 3px;
margin: 14px auto 0;
flex-shrink: 0;
}
.drawer-hdr {
display: flex; align-items: center; justify-content: space-between;
padding: 12px 20px 6px;
flex-shrink: 0;
}
.drawer-title {
font-family: ‘Cormorant Garamond’, serif;
font-style: italic;
font-size: 26px;
background: var(–gold-grd);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}
.drawer-clear {
font-size: 16px;
color: var(–red);
background: none;
padding: 6px 12px;
border-radius: 8px;
font-weight: 600;
letter-spacing: 0.3px;
}
.drawer-clear:active { background: var(–red-soft); }

.drawer-hint {
text-align: center;
font-size: 14px;
color: var(–text-t);
padding: 2px 0 8px;
letter-spacing: 1px;
}

.hist-list {
overflow-y: auto;
flex: 1;
padding: 2px 14px 10px;
-webkit-overflow-scrolling: touch;
}
.hist-empty {
text-align: center;
padding: 44px 20px;
color: var(–text-t);
font-size: 17px;
line-height: 2.2;
}
.hist-empty svg { opacity: 0.25; margin-bottom: 8px; display: block; margin-left: auto; margin-right: auto; }

.hi {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: var(–radius-md);
padding: 15px 18px;
margin-bottom: 10px;
cursor: pointer;
transition: background 0.12s, transform 0.1s, border-color 0.12s;
position: relative;
overflow: hidden;
}
.hi::before {
content: ‘’;
position: absolute;
left: 0; top: 0; bottom: 0;
width: 4px;
background: var(–gold-grd);
opacity: 0;
transition: opacity 0.15s;
}
.hi:active { transform: scale(0.975); background: var(–surface3); }
.hi:active::before { opacity: 1; }

.hi-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 5px; }
.hi-expr {
font-family: ‘DM Mono’, monospace;
font-size: 15px;
color: var(–text-t);
overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
flex: 1; margin-right: 10px;
}
.hi-time { font-size: 13px; color: var(–text-t); flex-shrink: 0; }

.hi-main {
font-family: ‘DM Mono’, monospace;
font-size: 32px;
font-weight: 600;
line-height: 1.1;
background: var(–gold-grd);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
margin-bottom: 4px;
}
.hi-zh { font-size: 14px; color: var(–text-t); letter-spacing: 1px; }

.hi-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.htag {
font-size: 13px;
padding: 4px 10px;
border-radius: 20px;
font-weight: 600;
font-family: ‘DM Mono’, monospace;
}
.htag.b { background: var(–surface4); color: var(–text-s); border: 1px solid var(–border); }
.htag.t { background: rgba(201,122,48,0.12); color: var(–orange); border: 1px solid rgba(201,122,48,0.2); }
.htag.g { background: var(–green-soft); color: var(–green); border: 1px solid rgba(74,154,92,0.2); }

.hi-use {
position: absolute;
right: 14px; bottom: 12px;
background: var(–gold-grd-soft);
color: var(–g2);
border: 1px solid var(–border-strong);
border-radius: 8px;
padding: 5px 11px;
font-size: 14px;
font-weight: 700;
letter-spacing: 0.5px;
opacity: 0;
transition: opacity 0.15s;
}
.hi:hover .hi-use { opacity: 1; }

/* ─── CUSTOM RATE MODAL ─── */
.modal-bg {
position: fixed; inset: 0;
background: rgba(0,0,0,0.65);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
z-index: 60;
display: flex; align-items: center; justify-content: center;
padding: 20px;
opacity: 0; pointer-events: none;
transition: opacity 0.22s;
}
.modal-bg.show { opacity: 1; pointer-events: all; }
.modal {
background: var(–surface);
border: 1px solid var(–border-strong);
border-radius: var(–radius-xl);
padding: 30px 24px 24px;
width: 100%; max-width: 320px;
box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(201,168,76,0.1);
transform: scale(0.88) translateY(10px);
transition: transform 0.25s cubic-bezier(0.34,1.2,0.64,1);
position: relative;
overflow: hidden;
}
.modal::before {
content: ‘’;
position: absolute; top: 0; left: 0; right: 0;
height: 2px;
background: var(–gold-grd);
}
.modal-bg.show .modal { transform: scale(1) translateY(0); }
.modal-title {
font-family: ‘Cormorant Garamond’, serif;
font-style: italic;
font-size: 28px;
background: var(–gold-grd);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
margin-bottom: 6px;
}
.modal-sub { font-size: 16px; color: var(–text-t); margin-bottom: 18px; letter-spacing: 0.5px; }
.modal-inp {
width: 100%;
background: var(–surface3);
border: 1.5px solid var(–border);
border-radius: var(–radius-sm);
padding: 14px 16px;
font-size: 30px;
font-family: ‘DM Mono’, monospace;
font-weight: 600;
color: var(–text-p);
text-align: right;
transition: border-color 0.15s;
}
.modal-inp:focus { border-color: var(–g3); }
.modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
.mbtn { border-radius: var(–radius-sm); padding: 16px; font-size: 18px; font-weight: 700; }
.mbtn-cancel { background: var(–surface3); color: var(–text-s); border: 1px solid var(–border); }
.mbtn-ok {
background: var(–gold-grd-btn);
color: #0a0800;
box-shadow: 0 3px 12px rgba(180,130,30,0.4);
}

/* ─── TOAST ─── */
.toast {
position: fixed;
top: 64px;
left: 50%; transform: translateX(-50%) translateY(-10px);
background: var(–surface);
border: 1px solid var(–border-strong);
border-radius: 28px;
padding: 12px 22px;
font-size: 16px;
font-weight: 600;
color: var(–g2);
box-shadow: 0 6px 24px rgba(0,0,0,0.5);
z-index: 100;
white-space: nowrap;
opacity: 0; pointer-events: none;
transition: opacity 0.2s, transform 0.2s;
letter-spacing: 0.5px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── ANIMATIONS ─── */
@keyframes goldPulse {
0%,100% { opacity: 1; }
50% { opacity: 0.6; }
}
@keyframes numIn {
from { opacity: 0; transform: translateY(4px) scale(0.95); }
to   { opacity: 1; transform: translateY(0) scale(1); }
}
.num-in { animation: numIn 0.15s ease; }
</style>

</head>
<body class="dark">

<!-- Toast -->

<div class="toast" id="toast"></div>

<!-- Modal -->

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title">自訂稅率</div>
    <div class="modal-sub">輸入稅率百分比（0 ~ 100）</div>

<script>
/* ═══════════ STATE ═══════════ */
const S = {
  d:'0', expr:'', prev:null, op:null, wait:false,
  rate:5, hist:[], taxOn:false
};

/* ═══════════ THEME ═══════════ */
let dark = localStorage.getItem('bgtTheme') !== 'light';
setTheme();
function setTheme(){
  document.body.classList.toggle('dark', dark);
  document.body.classList.toggle('light', !dark);
  document.getElementById('iSun').style.display  = dark  ? 'block':'none';
  document.getElementById('iMoon').style.display = !dark ? 'block':'none';
}
document.getElementById('themeBtn').onclick = ()=>{
  dark=!dark; localStorage.setItem('bgtTheme', dark?'dark':'light'); setTheme();
};

/* ═══════════ CHINESE ═══════════ */
function zh(str){
  const n=parseFloat(str);
  if(isNaN(n)||!isFinite(n)) return '';
  if(n===0) return '零元整';
  if(Math.abs(n)>999999999999) return '（數值過大）';
  const D=['零','壹','貳','參','肆','伍','陸','柒','捌','玖'];
  const U=['','拾','佰','仟'];
  const M=['','萬','億'];
  const neg=n<0;
  function sec(s){
    let r='',z=false;
    for(let i=0;i<s.length;i++){
      const d=+s[i],u=U[s.length-1-i];
      if(!d){z=true;}else{if(z){r+='零';z=false;}r+=D[d]+u;}
    }
    return r;
  }
  const abs=String(Math.round(Math.abs(n)));
  const cks=[];let t=abs;
  while(t.length){cks.unshift(t.slice(-4));t=t.slice(0,-4);}
  let res='';
  for(let i=0;i<cks.length;i++){
    const v=+cks[i];if(!v)continue;
    const s=sec(cks[i]);
    if(res&&cks[i][0]==='0')res+='零';
    res+=s+M[cks.length-1-i];
  }
  if(res.startsWith('壹拾'))res=res.slice(1);
  const di=str.indexOf('.');
  let dec='';
  if(di!==-1){
    const ds=str.slice(di+1).replace(/0+$/,'');
    if(ds){const DU=['角','分','厘','毫'];dec='點';for(let i=0;i<Math.min(ds.length,4);i++)dec+=D[+ds[i]]+(DU[i]||'');}
  }
  return (neg?'負':'')+res+'元'+(dec||'整');
}

/* ═══════════ FORMAT ═══════════ */
function fmt(v){
  if(v==='Error')return 'Error';
  const p=v.toString().split('.');
  p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return p.join('.');
}
function r2(n){return Math.round(n*100)/100;}
function calc(a,op,b){
  const fa=parseFloat(a),fb=parseFloat(b);
  if(op==='+')return fa+fb;
  if(op==='−')return fa-fb;
  if(op==='×')return fa*fb;
  if(op==='÷')return fb===0?'Error':fa/fb;
  return fb;
}

/* ═══════════ RENDER ═══════════ */
function render(){
  const mn=document.getElementById('mainNum');
  const zr=document.getElementById('zhRow');
  const er=document.getElementById('exprRow');
  if(S.d==='Error'){
    mn.textContent='運算錯誤';mn.className='main-num error';
    zr.textContent='';zr.classList.remove('lit');
  }else{
    mn.className='main-num num-in'+(fmt(S.d).length>11?' long':'');
    mn.textContent=fmt(S.d);
    const c=zh(S.d);
    zr.textContent=c;
    zr.classList.toggle('lit', !!c && c!=='零元整');
    setTimeout(()=>mn.classList.remove('num-in'),160);
  }
  er.textContent=S.expr;
}

function renderTax(base){
  const tr=document.getElementById('taxResult');
  if(S.rate===0||isNaN(base)){tr.classList.remove('show');S.taxOn=false;return null;}
  const taxAmt=r2(base*S.rate/100);
  const tot=r2(base+taxAmt);
  document.getElementById('tcB').textContent=fmt(base.toFixed(0));
  document.getElementById('tcT').textContent=fmt(taxAmt.toFixed(0));
  document.getElementById('tcTot').textContent=fmt(tot.toFixed(0));
  tr.classList.add('show');S.taxOn=true;
  return {taxAmt,tot};
}
function hideTax(){document.getElementById('taxResult').classList.remove('show');S.taxOn=false;}

/* ═══════════ HISTORY ═══════════ */
function loadH(){try{S.hist=JSON.parse(localStorage.getItem('bgtHist')||'[]');}catch{S.hist=[];}badge();}
function saveH(){localStorage.setItem('bgtHist',JSON.stringify(S.hist.slice(0,50)));badge();}
function badge(){
  const b=document.getElementById('hBadge');
  if(S.hist.length){b.style.display='flex';b.textContent=Math.min(S.hist.length,99);}
  else b.style.display='none';
}
function addH(entry){S.hist.unshift(entry);if(S.hist.length>50)S.hist.pop();saveH();renderHL();}

function tfmt(ts){
  const d=new Date(ts),now=new Date(),df=(now-d)/1000;
  if(df<60)return '剛剛';
  if(df<3600)return Math.floor(df/60)+'分前';
  if(df<86400)return Math.floor(df/3600)+'時前';
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function renderHL(){
  const el=document.getElementById('histList');
  if(!S.hist.length){
    el.innerHTML=`<div class="hist-empty">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 3.5"/></svg>
      <div>尚無計算記錄</div><div style="font-size:11px">計算後自動儲存</div>
    </div>`;return;
  }
  el.innerHTML=S.hist.map((h,i)=>`
    <div class="hi" data-i="${i}">
      <div class="hi-top">
        <div class="hi-expr">${h.expr||''}</div>
        <div class="hi-time">${tfmt(h.ts)}</div>
      </div>
      <div class="hi-main">${fmt(h.result)}</div>
      <div class="hi-zh">${h.zh||''}</div>
      ${h.taxTot?`<div class="hi-tags">
        <span class="htag b">未稅 ${fmt(String(h.taxBase))}</span>
        <span class="htag t">稅${h.taxRate}%→${fmt(String(h.taxAmt))}</span>
        <span class="htag g">含稅 ${fmt(String(h.taxTot))}</span>
      </div>`:''}
      <div class="hi-use">填入 ↗</div>
    </div>`).join('');
}

document.getElementById('histList').addEventListener('click',e=>{
  const el=e.target.closest('.hi');if(!el)return;
  const h=S.hist[+el.dataset.i];if(!h)return;
  S.d=h.result;S.expr='';S.op=null;S.prev=null;S.wait=false;
  render();
  if(h.taxTot){
    S.rate=h.taxRate;
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
    const ch=document.querySelector(`.chip[data-r="${h.taxRate}"]`);
    if(ch)ch.classList.add('on');
    else{document.getElementById('customChip').textContent=h.taxRate+'%✎';document.getElementById('customChip').classList.add('on');}
    renderTax(parseFloat(h.result));
  }else hideTax();
  closeD();toast('已填入：'+fmt(h.result));
});

/* ═══════════ DRAWER ═══════════ */
function openD(){renderHL();document.getElementById('drawer').classList.add('show');document.getElementById('overlay').classList.add('show');}
function closeD(){document.getElementById('drawer').classList.remove('show');document.getElementById('overlay').classList.remove('show');}
document.getElementById('histBtn').onclick=openD;
document.getElementById('overlay').onclick=closeD;
document.getElementById('clrHist').onclick=()=>{
  if(confirm('確定清除所有記錄？')){S.hist=[];saveH();renderHL();}
};

/* ═══════════ TOAST ═══════════ */
let tT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2400);
}

/* ═══════════ CHIPS ═══════════ */
document.getElementById('chips').addEventListener('click',e=>{
  const c=e.target.closest('.chip');if(!c)return;
  if(c.dataset.r==='custom'){
    document.getElementById('modalBg').classList.add('show');
    document.getElementById('modalInp').value='';
    setTimeout(()=>document.getElementById('modalInp').focus(),250);
    return;
  }
  S.rate=+c.dataset.r;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');
  document.getElementById('customChip').textContent='自訂＋';
  hideTax();
});

document.getElementById('modalNo').onclick=()=>document.getElementById('modalBg').classList.remove('show');
document.getElementById('modalYes').onclick=confirmRate;
document.getElementById('modalInp').addEventListener('keydown',e=>{if(e.key==='Enter')confirmRate();});
function confirmRate(){
  const v=parseFloat(document.getElementById('modalInp').value);
  if(isNaN(v)||v<0||v>100){toast('請輸入 0 ~ 100 的數值');return;}
  S.rate=r2(v);
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  const cc=document.getElementById('customChip');
  cc.textContent=v+'%✎';cc.classList.add('on');
  document.getElementById('modalBg').classList.remove('show');
  hideTax();
}

/* ═══════════ ACTIONS ═══════════ */
function aN(v){
  if(S.d==='Error')S.d='0';
  if(S.wait){S.d=v;S.wait=false;}
  else{
    if(S.d==='0'&&v!=='.')S.d=v;
    else if(S.d.replace(/[^0-9]/g,'').length<14)S.d+=v;
  }
  hideTax();render();
}
function aDot(){if(S.wait){S.d='0.';S.wait=false;render();return;}if(!S.d.includes('.'))S.d+='.';render();}
function aOp(op){
  if(S.d==='Error')return;
  if(S.op&&!S.wait){
    const res=calc(S.prev,S.op,S.d);
    if(res==='Error'){S.d='Error';S.op=null;render();return;}
    S.d=String(r2(res));S.prev=S.d;
  }else S.prev=S.d;
  S.op=op;S.wait=true;S.expr=fmt(S.prev)+' '+op;
  hideTax();render();
}
function aEq(){
  if(!S.op||S.wait){S.expr='';render();return;}
  const ex=fmt(S.prev)+' '+S.op+' '+fmt(S.d);
  const res=calc(S.prev,S.op,S.d);
  S.expr=ex+' =';
  if(res==='Error'){S.d='Error';}
  else{
    const rr=String(r2(res));
    addH({expr:ex,result:rr,zh:zh(rr),ts:Date.now()});
    S.d=rr;
  }
  S.op=null;S.prev=null;S.wait=false;
  hideTax();render();
}
function aClear(){S.d='0';S.expr='';S.prev=null;S.op=null;S.wait=false;hideTax();render();}
function aSign(){if(S.d==='0'||S.d==='Error')return;S.d=S.d.startsWith('-')?S.d.slice(1):'-'+S.d;render();}
function aPct(){const n=parseFloat(S.d);if(isNaN(n))return;S.d=String(r2(n/100));render();}
function aBs(){
  if(S.d==='Error'||S.wait){aClear();return;}
  S.d=S.d.length<=1||(S.d.length===2&&S.d[0]==='-')?'0':S.d.slice(0,-1);
  render();
}
function aTax(){
  const base=parseFloat(S.d.replace(/,/g,''));
  if(isNaN(base))return;
  const res=renderTax(base);
  if(res){
    addH({
      expr:S.expr||fmt(S.d),result:S.d,zh:zh(S.d),
      taxRate:S.rate,taxBase:r2(base),taxAmt:r2(res.taxAmt),taxTot:r2(res.tot),
      ts:Date.now()
    });
  }
}
function aCopy(){
  const txt=S.d.replace(/,/g,'');
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>toast('◆ 已複製 '+fmt(S.d)));}
  else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('◆ 已複製 '+fmt(S.d));}
}

/* ═══════════ BUTTON EVENTS ═══════════ */
document.querySelectorAll('.btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    const a=this.dataset.a,v=this.dataset.v;
    if(a==='n')aN(v);
    else if(a==='dot')aDot();
    else if(a==='op')aOp(v);
    else if(a==='eq')aEq();
    else if(a==='clear')aClear();
    else if(a==='sign')aSign();
    else if(a==='pct')aPct();
    else if(a==='bs')aBs();
    else if(a==='tax')aTax();
    else if(a==='copy')aCopy();
  });
});

/* ═══════════ KEYBOARD ═══════════ */
document.addEventListener('keydown',e=>{
  if(document.getElementById('modalBg').classList.contains('show'))return;
  if(e.key>='0'&&e.key<='9')aN(e.key);
  else if(e.key==='.')aDot();
  else if(e.key==='+')aOp('+');
  else if(e.key==='-')aOp('−');
  else if(e.key==='*')aOp('×');
  else if(e.key==='/'){e.preventDefault();aOp('÷');}
  else if(e.key==='Enter'||e.key==='=')aEq();
  else if(e.key==='Escape')aClear();
  else if(e.key==='Backspace')aBs();
  else if(e.key==='%')aPct();
  else if(e.key==='t'||e.key==='T')aTax();
  else if((e.ctrlKey||e.metaKey)&&e.key==='c')aCopy();
});

/* ═══════════ INIT ═══════════ */
loadH();render();
</script>
